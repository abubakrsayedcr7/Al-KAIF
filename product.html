<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product - ALKAIF</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box}

/* BODY */
body{
  font-family:'Inter',sans-serif;
  background:#fff;
}

/* HEADER */
.header{
  position:fixed;
  top:0;
  width:100%;
  background:#fff;
  padding:14px 18px;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #eee;
  z-index:1000;
}

.header a{
  text-decoration:none;
  color:#000;
  font-size:14px;
}

/* CONTAINER */
.container{
  margin-top:70px;
  padding:16px;
}

/* IMAGE */
.product-img{
  width:100%;
  border-radius:14px;
}

/* NAME */
.name{
  font-size:18px;
  margin:12px 0 6px;
  font-weight:500;
}

/* STARS */
.stars{
  color:#f5a623;
  font-size:14px;
}

/* PRICE */
.price{
  font-size:20px;
  font-weight:600;
  margin-top:10px;
}

.old{
  text-decoration:line-through;
  color:#999;
  font-size:14px;
}

.discount{
  color:green;
  font-size:14px;
}

/* DESC */
.desc{
  margin-top:15px;
  font-size:14px;
  color:#444;
}

/* BUTTONS */
.btn{
  width:100%;
  padding:14px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  font-size:14px;
}

.cart{
  background:#000;
  color:#fff;
}

.buy{
  background:#fff;
  border:1px solid #000;
}

/* DESKTOP */
@media(min-width:900px){
  .container{
    max-width:900px;
    margin:auto;
    margin-top:80px;
  }
}

</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <a href="index.html">← Back</a>
  <a href="cart.html">Cart</a>
</div>

<!-- PRODUCT -->
<div class="container">

  <img id="img" class="product-img">

  <div class="name" id="name"></div>

  <div class="stars">★★★★★ (120 reviews)</div>

  <div class="price">₹<span id="price"></span></div>
  <div class="old">₹<span id="old"></span></div>
  <div class="discount" id="discount"></div>

  <div class="desc" id="desc"></div>

  <button class="btn cart" onclick="addCart()">Add to Cart</button>
  <button class="btn buy" onclick="buyNow()">Buy Now</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* FIREBASE */
const app = initializeApp({
  apiKey:"YOUR_KEY",
  authDomain:"alkaif.firebaseapp.com",
  projectId:"alkaif"
});

const db = getFirestore(app);
const auth = getAuth(app);

/* GET ID */
const id = new URLSearchParams(location.search).get("id");

/* LOAD PRODUCT */
const snap = await getDoc(doc(db,"products",id));
const p = snap.data();

img.src = "assets/"+p.image;
name.innerText = p.name;
price.innerText = p.price;
old.innerText = p.actualPrice;
discount.innerText = p.discount;
desc.innerText = p.description;

/* ADD TO CART */
window.addCart = async ()=>{

  if(!auth.currentUser){
    location.href="login.html";
    return;
  }

  await setDoc(doc(db,"cart", auth.currentUser.uid+"_"+id),{
    user:auth.currentUser.email,
    product:p.name,
    price:p.price,
    image:p.image
  });

  alert("Added to Cart");
};

/* BUY NOW */
window.buyNow = ()=>{
  localStorage.setItem("amount",p.price);
  localStorage.setItem("product",p.name);
  location.href="checkout.html";
};

</script>

</body>
</html>
