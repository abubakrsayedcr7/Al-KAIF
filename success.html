<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Success - ALKAIF</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box}

/* BODY */
body{
  font-family:'Inter',sans-serif;
  background:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
}

/* TICK CIRCLE */
.circle{
  width:90px;
  height:90px;
  border:3px solid #000;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  animation:scale 0.4s ease;
}

/* CHECK MARK */
.tick{
  width:25px;
  height:45px;
  border-right:4px solid #000;
  border-bottom:4px solid #000;
  transform:rotate(45deg);
  animation:tick 0.5s ease;
}

/* TEXT */
h2{
  margin-top:20px;
  font-weight:500;
}

p{
  margin-top:5px;
  color:#555;
  font-size:14px;
}

/* BUTTONS */
.btn{
  margin-top:25px;
  width:200px;
  padding:12px;
  border:none;
  background:#000;
  color:#fff;
  border-radius:10px;
  text-align:center;
  text-decoration:none;
}

/* SECOND BUTTON */
.btn-outline{
  margin-top:10px;
  background:#fff;
  border:1px solid #000;
  color:#000;
}

/* ANIMATION */
@keyframes scale{
  from{transform:scale(0)}
  to{transform:scale(1)}
}

@keyframes tick{
  from{opacity:0;transform:rotate(45deg) scale(0.5)}
  to{opacity:1;transform:rotate(45deg) scale(1)}
}

</style>
</head>
<body>

<!-- TICK -->
<div class="circle">
  <div class="tick"></div>
</div>

<!-- TEXT -->
<h2>Order Placed</h2>
<p>Your order has been successfully placed</p>

<!-- BUTTONS -->
<a href="index.html" class="btn">Continue Shopping</a>
<a href="orders.html" class="btn btn-outline">My Orders</a>

</body>
</html>
