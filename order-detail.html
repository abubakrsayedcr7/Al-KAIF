<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Detail - ALKAIF</title>

<link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">

<style>
body{font-family:Inter;padding:20px;background:#f8f8f8}

.card{
  background:#fff;
  padding:15px;
  border-radius:12px;
}

img{
  width:100%;
  border-radius:10px;
}

h2{margin-top:10px}

p{margin:5px 0}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:black;
  color:white;
}
</style>
</head>
<body>

<div class="card" id="detail"></div>

<button onclick="download()">Download Invoice</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"YOUR_KEY",
  authDomain:"alkaif.firebaseapp.com",
  projectId:"alkaif"
});

const db = getFirestore(app);

const id = new URLSearchParams(location.search).get("id");
const box = document.getElementById("detail");

let orderData = null;

/* LOAD */
const snap = await getDoc(doc(db,"orders",id));
const o = snap.data();

orderData = o;

box.innerHTML = `
  <img src="assets/${o.image || 'default.jpg'}">

  <h2>${o.product}</h2>
  <p><b>Price:</b> ₹${o.price}</p>
  <p><b>Status:</b> ${o.status}</p>

  <hr>

  <p><b>Name:</b> ${o.name}</p>
  <p><b>Phone:</b> ${o.phone}</p>
  <p><b>Address:</b> ${o.address}</p>
  <p><b>Email:</b> ${o.user}</p>
`;

/* DOWNLOAD PDF */
window.download = ()=>{

  const text = `
ALKAIF INVOICE

Product: ${orderData.product}
Price: ₹${orderData.price}

Customer: ${orderData.name}
Phone: ${orderData.phone}
Address: ${orderData.address}

Status: ${orderData.status}
`;

  const blob = new Blob([text], {type:"text/plain"});
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "invoice.txt";
  link.click();
};

</script>

</body>
</html>
