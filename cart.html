<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALKAIF Cart</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Inter';
  background:#020705;
  color:#fff;
}

/* ===== BG GLOW ===== */
.bg{
  position:fixed;
  width:200%;
  height:200%;
  background:
    radial-gradient(circle at 30% 70%, #00ff8840, transparent 60%),
    radial-gradient(circle at 70% 30%, #00ffaa30, transparent 60%);
  filter:blur(120px);
  animation:move 12s infinite alternate;
  z-index:-1;
}
@keyframes move{
  0%{transform:translate(0,0)}
  100%{transform:translate(-120px,80px)}
}

/* ===== HEADER ===== */
.header{
  padding:20px;
  font-family:'Playfair Display';
  font-size:26px;
}

/* ===== CART ITEM ===== */
.cart-list{padding:20px}

.item-wrap{
  position:relative;
  overflow:hidden;
  margin-bottom:15px;
}

.delete-bg{
  position:absolute;
  right:0;
  top:0;
  bottom:0;
  width:80px;
  background:red;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  border-radius:15px;
}

.item{
  display:flex;
  gap:15px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border-radius:15px;
  padding:12px;
  transition:0.3s;
}

.item img{
  width:90px;
  height:90px;
  border-radius:10px;
  object-fit:cover;
}

.qty{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.qty button{
  border:none;
  background:#fff;
  padding:6px 12px;
  border-radius:8px;
  font-weight:bold;
}

/* ===== TOTAL ===== */
.total{
  padding:20px;
  font-size:20px;
  font-weight:600;
}

/* ===== BUTTON ===== */
.checkout{
  margin:20px;
  padding:15px;
  width:calc(100% - 40px);
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#fff,#ddd);
  color:#000;
  font-weight:600;
  transition:0.3s;
}
.checkout:hover{
  transform:scale(1.05);
}

/* ===== POPUP ===== */
.popup{
  position:fixed;
  inset:0;
  background:#000000cc;
  display:none;
  justify-content:center;
  align-items:center;
}

.box{
  background:#111;
  padding:20px;
  border-radius:15px;
  width:90%;
}

input{
  width:100%;
  margin:10px 0;
  padding:12px;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="header">Your Cart</div>

<div class="cart-list" id="cartList"></div>

<div class="total" id="total">Total: ₹0</div>

<button class="checkout" onclick="openAddress()">Proceed to Checkout</button>

<!-- ADDRESS -->
<div class="popup" id="addressPopup">
  <div class="box">
    <h3>Enter Address</h3>
    <input id="name" placeholder="Name">
    <input id="phone" placeholder="Phone">
    <input id="address" placeholder="Address">
    <button onclick="nextStep()">Next</button>
  </div>
</div>

<!-- PAYMENT -->
<div class="popup" id="paymentPopup">
  <div class="box">
    <h3>Select Payment</h3>
    <button onclick="placeOrder('COD')">Cash on Delivery</button>
    <button onclick="placeOrder('ONLINE')">Online Payment</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, doc, updateDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */
const app = initializeApp({
  apiKey:"AIzaSyBcvViENWxHC1b9j5V2xOFGMaL-2TYfdiw",
  authDomain:"al-kaif-61446.firebaseapp.com",
  projectId:"al-kaif-61446"
});
const db = getFirestore(app);

/* USER */
let user = JSON.parse(localStorage.getItem("user")) || {id:"guest_"+Date.now()};

/* CART */
let cart = JSON.parse(localStorage.getItem("cart")) || [];

const cartList=document.getElementById("cartList");
const totalEl=document.getElementById("total");

/* RENDER */
function render(){

  cart = JSON.parse(localStorage.getItem("cart")) || [];

  cartList.innerHTML="";
  let total=0;

  cart.forEach((p,index)=>{

    total += p.price*p.qty;

    cartList.innerHTML+=`
    <div class="item-wrap">
      <div class="delete-bg">Delete</div>

      <div class="item" id="item${index}">
        <img src="${p.image}">
        <div>
          <div>${p.name}</div>
          <div>₹${p.price}</div>

          <div class="qty">
            <button onclick="changeQty('${p.id}',-1)">-</button>
            <span>${p.qty}</span>
            <button onclick="changeQty('${p.id}',1)">+</button>
          </div>
        </div>
      </div>
    </div>
    `;
  });

  totalEl.innerText="Total: ₹"+total;

  enableSwipe();
}

/* SWIPE DELETE */
function enableSwipe(){

  document.querySelectorAll(".item").forEach((el,index)=>{

    let startX=0;

    el.addEventListener("touchstart",(e)=>{
      startX=e.touches[0].clientX;
    });

    el.addEventListener("touchmove",(e)=>{
      let move=e.touches[0].clientX;
      let diff=startX-move;

      if(diff>0){
        el.style.transform=`translateX(-${diff}px)`;
      }
    });

    el.addEventListener("touchend",(e)=>{
      let moved=parseInt(el.style.transform.replace(/[^\d]/g,'')) || 0;

      if(moved>80){
        cart.splice(index,1);
        localStorage.setItem("cart",JSON.stringify(cart));
        render();
      }else{
        el.style.transform="translateX(0)";
      }
    });

  });

}

/* QTY */
window.changeQty=(id,val)=>{
  let item=cart.find(x=>x.id==id);
  if(!item) return;

  item.qty+=val;

  if(item.qty<=0){
    cart=cart.filter(x=>x.id!=id);
  }

  localStorage.setItem("cart",JSON.stringify(cart));
  render();
};

/* ADDRESS */
window.openAddress=()=>{
  if(cart.length===0){
    alert("Cart empty ❌");
    return;
  }
  document.getElementById("addressPopup").style.display="flex";
};

window.nextStep=()=>{
  document.getElementById("addressPopup").style.display="none";
  document.getElementById("paymentPopup").style.display="flex";
};

/* ORDER */
async function saveOrder(method,paymentId="COD"){

  let name=document.getElementById("name").value;
  let phone=document.getElementById("phone").value;
  let address=document.getElementById("address").value;

  let total=cart.reduce((s,i)=>s+i.price*i.qty,0);

  await addDoc(collection(db,"orders"),{
    user,
    name,phone,address,
    items:cart,
    total,
    method,
    paymentId,
    status:"Placed",
    time:new Date()
  });

  const snap=await getDocs(collection(db,"products"));

  snap.forEach(async d=>{
    let data=d.data();
    let item=cart.find(x=>x.id==d.id);

    if(item){
      await updateDoc(doc(db,"products",d.id),{
        stock:(data.stock||0)-item.qty
      });
    }
  });

  localStorage.removeItem("cart");
  location.href="success.html";
}

/* PAYMENT */
window.placeOrder=(method)=>{
  if(method==="COD"){
    saveOrder("COD");
  }else{

    let total=cart.reduce((s,i)=>s+i.price*i.qty,0);

    let rzp=new Razorpay({
      key:"rzp_live_SUAHUYpa5U0E9T",
      amount:total*100,
      currency:"INR",
      name:"ALKAIF",
      handler:function(res){
        saveOrder("ONLINE",res.razorpay_payment_id);
      }
    });

    rzp.open();
  }
};

/* START */
render();

</script>

</body>
</html>
