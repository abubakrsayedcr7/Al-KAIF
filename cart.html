<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALKAIF Cart</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Inter';
  background:#020705;
  color:#fff;
}

/* BACKGROUND */
.bg{
  position:fixed;
  width:200%;
  height:200%;
  background:
    radial-gradient(circle at 30% 70%, #00ff8840, transparent 60%),
    radial-gradient(circle at 70% 30%, #00ffaa30, transparent 60%);
  filter:blur(100px);
  animation:move 10s infinite alternate;
  z-index:-1;
}
@keyframes move{
  0%{transform:translate(0,0)}
  100%{transform:translate(-120px,80px)}
}

/* HEADER */
.header{
  padding:20px;
  display:flex;
  justify-content:space-between;
}
.title{
  font-family:'Playfair Display';
  font-size:26px;
}

/* CART LIST */
.cart-list{
  padding:20px;
}
.item{
  display:flex;
  gap:15px;
  background:#111;
  border-radius:15px;
  margin-bottom:15px;
  padding:10px;
}
.item img{
  width:90px;
  height:90px;
  object-fit:cover;
  border-radius:10px;
}
.info{
  flex:1;
}
.qty{
  display:flex;
  gap:10px;
  margin-top:10px;
}
.qty button{
  padding:5px 10px;
}

/* TOTAL */
.total{
  padding:20px;
  font-size:20px;
  font-weight:600;
}

/* BUTTON */
.checkout{
  margin:20px;
  padding:15px;
  width:calc(100% - 40px);
  border:none;
  border-radius:12px;
  background:#fff;
  color:#000;
  font-weight:600;
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:#000000cc;
  display:none;
  align-items:center;
  justify-content:center;
}
.box{
  background:#111;
  padding:20px;
  border-radius:15px;
  width:90%;
}
input{
  width:100%;
  margin:10px 0;
  padding:12px;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="header">
  <div class="title">Your Cart</div>
</div>

<div class="cart-list" id="cartList"></div>

<div class="total" id="total">Total: ₹0</div>

<button class="checkout" onclick="openAddress()">Proceed to Checkout</button>

<!-- ADDRESS POPUP -->
<div class="popup" id="addressPopup">
  <div class="box">
    <h3>Enter Address</h3>
    <input id="name" placeholder="Name">
    <input id="phone" placeholder="Phone">
    <input id="address" placeholder="Address">
    <button onclick="nextStep()">Next</button>
  </div>
</div>

<!-- PAYMENT POPUP -->
<div class="popup" id="paymentPopup">
  <div class="box">
    <h3>Select Payment</h3>
    <button onclick="placeOrder('COD')">Cash on Delivery</button>
    <button onclick="placeOrder('ONLINE')">Online Payment</button>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, doc, updateDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */
const app = initializeApp({
  apiKey:"AIzaSyBcvViENWxHC1b9j5V2xOFGMaL-2TYfdiw",
  authDomain:"al-kaif-61446.firebaseapp.com",
  projectId:"al-kaif-61446"
});
const db = getFirestore(app);

/* CART */
let cart = JSON.parse(localStorage.getItem("cart")) || [];

const cartList = document.getElementById("cartList");
const totalEl = document.getElementById("total");

/* RENDER */
function render(){
  cartList.innerHTML="";
  let total=0;

  cart.forEach(p=>{
    total += p.price * p.qty;

    cartList.innerHTML+=`
    <div class="item">
      <img src="${p.image}">
      <div class="info">
        <div>${p.name}</div>
        <div>₹${p.price}</div>

        <div class="qty">
          <button onclick="changeQty('${p.id}',-1)">-</button>
          <span>${p.qty}</span>
          <button onclick="changeQty('${p.id}',1)">+</button>
        </div>
      </div>
    </div>
    `;
  });

  totalEl.innerText = "Total: ₹"+total;
}

/* QTY */
window.changeQty=(id,val)=>{
  let item = cart.find(x=>x.id==id);
  if(!item) return;

  item.qty += val;

  if(item.qty<=0){
    cart = cart.filter(x=>x.id!=id);
  }

  localStorage.setItem("cart",JSON.stringify(cart));
  render();
};

/* ADDRESS */
window.openAddress=()=>{
  if(cart.length===0){
    alert("Cart empty ❌");
    return;
  }
  document.getElementById("addressPopup").style.display="flex";
};

window.nextStep=()=>{
  document.getElementById("addressPopup").style.display="none";
  document.getElementById("paymentPopup").style.display="flex";
};

/* ORDER */
window.placeOrder=async(method)=>{

  let name=document.getElementById("name").value;
  let phone=document.getElementById("phone").value;
  let address=document.getElementById("address").value;

  let total=cart.reduce((s,i)=>s+i.price*i.qty,0);

  /* SAVE ORDER */
  await addDoc(collection(db,"orders"),{
    name,phone,address,
    items:cart,
    total,
    method,
    status:"Placed",
    time:new Date()
  });

  /* STOCK REDUCE */
  const snap = await getDocs(collection(db,"products"));

  snap.forEach(async d=>{
    let data=d.data();
    let item = cart.find(x=>x.id==d.id);

    if(item){
      let newStock = (data.stock || 0) - item.qty;
      await updateDoc(doc(db,"products",d.id),{
        stock:newStock
      });
    }
  });

  /* CLEAR CART */
  localStorage.removeItem("cart");

  /* SUCCESS */
  location.href="success.html";
};

/* START */
render();

</script>

</body>
</html>
