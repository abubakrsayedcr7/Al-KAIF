<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALKAIF</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Inter';
  background:#020705;
  color:#fff;
}

/* BG */
.bg{
  position:fixed;
  width:200%;
  height:200%;
  background:
    radial-gradient(circle at 20% 70%, #00ff8840, transparent 60%),
    radial-gradient(circle at 80% 20%, #00ffaa30, transparent 60%);
  filter:blur(120px);
  animation:move 12s infinite alternate;
  z-index:-1;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:20px;
}

.logo{
  font-family:'Playfair Display';
  font-size:24px;
}

.nav button{
  background:#111;
  border:1px solid #333;
  padding:10px 15px;
  border-radius:20px;
  color:#fff;
}

/* HERO */
.hero{
  text-align:center;
  padding:60px 20px;
}

.hero h1{
  font-size:52px;
  font-family:'Playfair Display';
}

.hero p{
  opacity:0.7;
}

/* FEATURES */
.features{
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
}

.feature{
  background:#111;
  padding:10px 16px;
  border-radius:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border-radius:20px;
  overflow:hidden;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-8px);
}

/* IMAGE */
.card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

/* CONTENT */
.content{padding:15px}

.title{font-size:18px}

.price{opacity:0.8}

/* BUTTON */
.btn{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#fff;
  color:#000;
  font-weight:600;
}

/* FLOAT CART */
.cart{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#fff;
  color:#000;
  padding:12px 20px;
  border-radius:30px;
  font-weight:600;
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="header">
  <div class="logo">ALKAIF</div>
  <div class="nav">
    <a href="orders.html"><button>Orders</button></a>
    <button id="cartCount">Cart (0)</button>
  </div>
</div>

<div class="hero">
  <h1>ALKAIF</h1>
  <p>Elegance in Modesty • Premium Islamic Wear</p>
</div>

<div class="features">
  <div class="feature">Premium Fabric</div>
  <div class="feature">Modern Design</div>
  <div class="feature">Comfort Fit</div>
</div>

<div class="grid" id="grid"></div>

<a href="cart.html" class="cart" id="floatCart">🛒 Cart (0)</a>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */
const app = initializeApp({
  apiKey:"AIzaSyBcvViENWxHC1b9j5V2xOFGMaL-2TYfdiw",
  authDomain:"al-kaif-61446.firebaseapp.com",
  projectId:"al-kaif-61446"
});
const db = getFirestore(app);

/* GLOBAL */
let products=[];
let cart=JSON.parse(localStorage.getItem("cart"))||[];

const grid=document.getElementById("grid");
const cartCount=document.getElementById("cartCount");
const floatCart=document.getElementById("floatCart");

/* LOGIN */
function checkLogin(){
  if(!localStorage.getItem("user")){
    location.href="login.html";
    return false;
  }
  return true;
}

/* CART UI */
function updateCart(){
  let count=cart.reduce((s,i)=>s+i.qty,0);
  cartCount.innerText=`Cart (${count})`;
  floatCart.innerText=`🛒 Cart (${count})`;
}

/* ADD */
window.addToCart=(id)=>{
  if(!checkLogin()) return;

  let p=products.find(x=>x.id==id);
  if(!p || p.stock<=0){
    alert("Out of stock ❌");
    return;
  }

  let ex=cart.find(x=>x.id==id);

  if(ex) ex.qty++;
  else cart.push({...p,qty:1});

  localStorage.setItem("cart",JSON.stringify(cart));

  updateCart();
  render();
};

/* QTY */
window.changeQty=(id,val)=>{
  let item=cart.find(x=>x.id==id);
  if(!item) return;

  item.qty+=val;

  if(item.qty<=0){
    cart=cart.filter(x=>x.id!=id);
  }

  localStorage.setItem("cart",JSON.stringify(cart));

  updateCart();
  render();
};

/* RENDER */
function render(){

  grid.innerHTML="";

  products.forEach(p=>{

    let existing=cart.find(c=>c.id==p.id);
    let inStock=p.stock>0;

    grid.innerHTML+=`
    <div class="card">

      <img src="${p.image}">

      <div class="content">
        <div class="title">${p.name}</div>

        <div class="price">
          ${p.oldPrice ? `<span style="text-decoration:line-through;opacity:0.5">₹${p.oldPrice}</span>` : ""}
          <b> ₹${p.price}</b>
        </div>

        ${
          !inStock
          ? `<button class="btn" style="background:#444;color:#aaa">Out of Stock</button>`
          : existing
          ? `
          <div style="display:flex;gap:10px;margin-top:10px;">
            <button onclick="changeQty('${p.id}',-1)">-</button>
            <span>${existing.qty}</span>
            <button onclick="changeQty('${p.id}',1)">+</button>
          </div>
          `
          : `<button onclick="addToCart('${p.id}')" class="btn">Add to Cart</button>`
        }

      </div>

    </div>
    `;
  });

}

/* LOAD */
async function start(){

  try{

    const snap=await getDocs(collection(db,"products"));

    if(!snap.empty){
      products=snap.docs.map(d=>{
        let data=d.data();
        return {
          id:d.id,
          name:data.name,
          price:Number(data.price),
          oldPrice:data.oldPrice ? Number(data.oldPrice):null,
          image:data.image,
          stock:Number(data.stock)
        };
      });

      render();
    }

    onSnapshot(collection(db,"products"), (snapshot)=>{
      products=snapshot.docs.map(d=>{
        let data=d.data();
        return {
          id:d.id,
          name:data.name,
          price:Number(data.price),
          oldPrice:data.oldPrice ? Number(data.oldPrice):null,
          image:data.image,
          stock:Number(data.stock)
        };
      });

      render();
      updateCart();
    });

  }catch(e){
    console.log("Firebase error");
  }

}

updateCart();
start();

</script>

</body>
</html>
