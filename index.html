<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALKAIF</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter';
  background:#020705;
  color:#fff;
}

/* BG */
.bg{
  position:fixed;
  width:200%;
  height:200%;
  background:
    radial-gradient(circle at 20% 70%, #00ff8840, transparent 60%),
    radial-gradient(circle at 80% 20%, #00ffaa30, transparent 60%);
  filter:blur(100px);
  animation:move 10s infinite alternate;
  z-index:-1;
}

.header{
  display:flex;
  justify-content:space-between;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:#111;
  border-radius:20px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.content{padding:15px}

.btn{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#fff;
  color:#000;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="header">
  <h2>ALKAIF</h2>
  <a href="cart.html" id="cartBtn">Cart (0)</a>
</div>

<div class="grid" id="grid"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  doc, 
  updateDoc, 
  getDocs 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ================= FIREBASE ================= */
const app = initializeApp({
  apiKey:"AIzaSyBcvViENWxHC1b9j5V2xOFGMaL-2TYfdiw",
  authDomain:"al-kaif-61446.firebaseapp.com",
  projectId:"al-kaif-61446"
});
const db = getFirestore(app);

/* ================= USER ================= */
let user = JSON.parse(localStorage.getItem("user"));

/* guest auto create */
if(!user){
  user = {
    id: "guest_" + Date.now(),
    name: "Guest User"
  };
  localStorage.setItem("user", JSON.stringify(user));
}

/* ================= CART ================= */
let cart = JSON.parse(localStorage.getItem("cart")) || [];

const cartList = document.getElementById("cartList");
const totalEl = document.getElementById("total");

/* ================= RENDER ================= */
function render(){

  cart = JSON.parse(localStorage.getItem("cart")) || [];

  cartList.innerHTML="";
  let total=0;

  if(cart.length===0){
    cartList.innerHTML="<p style='opacity:0.6'>Cart empty 🛒</p>";
    totalEl.innerText="Total: ₹0";
    return;
  }

  cart.forEach(p=>{

    total += p.price * p.qty;

    cartList.innerHTML+=`
    <div class="item">
      <img src="${p.image}">
      <div class="info">
        <div>${p.name}</div>
        <div>₹${p.price}</div>

        <div class="qty">
          <button onclick="changeQty('${p.id}',-1)">-</button>
          <span>${p.qty}</span>
          <button onclick="changeQty('${p.id}',1)">+</button>
        </div>
      </div>
    </div>
    `;
  });

  totalEl.innerText = "Total: ₹"+total;
}

/* ================= QTY ================= */
window.changeQty = (id,val)=>{

  let item = cart.find(x=>x.id==id);
  if(!item) return;

  item.qty += val;

  if(item.qty<=0){
    cart = cart.filter(x=>x.id!=id);
  }

  localStorage.setItem("cart",JSON.stringify(cart));
  render();
};

/* ================= ADDRESS ================= */
window.openAddress=()=>{

  if(cart.length===0){
    alert("Cart empty ❌");
    return;
  }

  document.getElementById("addressPopup").style.display="flex";
};

window.nextStep=()=>{

  let name=document.getElementById("name").value;
  let phone=document.getElementById("phone").value;
  let address=document.getElementById("address").value;

  if(!name || !phone || !address){
    alert("Fill all details ❌");
    return;
  }

  document.getElementById("addressPopup").style.display="none";
  document.getElementById("paymentPopup").style.display="flex";
};

/* ================= SAVE ORDER ================= */
async function saveOrder(method, paymentId="COD"){

  let name=document.getElementById("name").value;
  let phone=document.getElementById("phone").value;
  let address=document.getElementById("address").value;

  let total = cart.reduce((s,i)=>s+i.price*i.qty,0);

  /* 🔥 SAVE FULL ORDER */
  await addDoc(collection(db,"orders"),{
    userId: user.id,
    userName: user.name,
    name,
    phone,
    address,
    items: cart,
    total,
    paymentMethod: method,
    paymentId: paymentId,
    status:"Placed",
    createdAt: new Date()
  });

  /* 🔥 STOCK AUTO REDUCE */
  const snap = await getDocs(collection(db,"products"));

  for(const d of snap.docs){

    let data = d.data();
    let item = cart.find(x=>x.id==d.id);

    if(item){

      let newStock = (data.stock || 0) - item.qty;

      await updateDoc(doc(db,"products",d.id),{
        stock: newStock < 0 ? 0 : newStock
      });

    }
  }

  /* CLEAR CART */
  localStorage.removeItem("cart");

  /* SUCCESS */
  location.href="success.html";
}

/* ================= COD ================= */
window.placeOrder = (method)=>{

  if(method==="COD"){
    saveOrder("COD");
  }else{
    startRazorpay();
  }
};

/* ================= RAZORPAY ================= */
function startRazorpay(){

  let total = cart.reduce((s,i)=>s+i.price*i.qty,0);

  let options = {
    key: "rzp_live_SUAHUYpa5U0E9T",
    amount: total * 100,
    currency: "INR",
    name: "ALKAIF",

    handler: function (response){
      saveOrder("ONLINE", response.razorpay_payment_id);
    }
  };

  let rzp = new Razorpay(options);
  rzp.open();
}

/* ================= START ================= */
render();

</script>

</body>
</html>
