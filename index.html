<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALKAIF</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter';
  background:#020705;
  color:#fff;
}

/* BG */
.bg{
  position:fixed;
  width:200%;
  height:200%;
  background:
    radial-gradient(circle at 20% 70%, #00ff8840, transparent 60%),
    radial-gradient(circle at 80% 20%, #00ffaa30, transparent 60%);
  filter:blur(100px);
  animation:move 10s infinite alternate;
  z-index:-1;
}

.header{
  display:flex;
  justify-content:space-between;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:#111;
  border-radius:20px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.content{padding:15px}

.btn{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#fff;
  color:#000;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="header">
  <h2>ALKAIF</h2>
  <a href="cart.html" id="cartBtn">Cart (0)</a>
</div>

<div class="grid" id="grid"></div>

<script>

/* PRODUCTS */
let products=[
{id:"1",name:"Puzzle Jubba",price:1999,image:"https://picsum.photos/id/1011/400/500",stock:10},
{id:"2",name:"Cream Jubba",price:1999,image:"https://picsum.photos/id/1005/400/500",stock:5},
{id:"3",name:"Golden Jubba",price:1999,image:"https://picsum.photos/id/1001/400/500",stock:0},
{id:"4",name:"Royal Jubba",price:1999,image:"https://picsum.photos/id/1012/400/500",stock:7},
{id:"5",name:"Grey Jubba",price:1999,image:"https://picsum.photos/id/1013/400/500",stock:6},
{id:"6",name:"Black Jubba",price:1999,image:"https://picsum.photos/id/1015/400/500",stock:4}
];

/* CART */
let cart = JSON.parse(localStorage.getItem("cart")) || [];

const grid = document.getElementById("grid");
const cartBtn = document.getElementById("cartBtn");

/* UPDATE CART COUNT */
function updateCart(){
  let count = cart.reduce((s,i)=>s+i.qty,0);
  cartBtn.innerText = "Cart ("+count+")";
}

/* ADD TO CART (MAIN FIX) */
function addToCart(id){

  let p = products.find(x=>x.id==id);
  if(!p) return;

  if(p.stock<=0){
    alert("Out of stock ❌");
    return;
  }

  let existing = cart.find(x=>x.id==id);

  if(existing){
    existing.qty += 1;
  }else{
    cart.push({
      id:p.id,
      name:p.name,
      price:p.price,
      image:p.image,
      qty:1
    });
  }

  /* SAVE */
  localStorage.setItem("cart", JSON.stringify(cart));

  console.log("Cart saved:", cart); // DEBUG

  updateCart();
  render();
}

/* CHANGE QTY */
function changeQty(id,val){

  let item = cart.find(x=>x.id==id);
  if(!item) return;

  item.qty += val;

  if(item.qty<=0){
    cart = cart.filter(x=>x.id!=id);
  }

  localStorage.setItem("cart", JSON.stringify(cart));

  updateCart();
  render();
}

/* RENDER */
function render(){

  grid.innerHTML="";

  products.forEach(p=>{

    let existing = cart.find(c=>c.id==p.id);
    let inStock = p.stock>0;

    grid.innerHTML+=`
    <div class="card">

      <img src="${p.image}">

      <div class="content">
        <div>${p.name}</div>
        <div>₹${p.price}</div>

        ${
          !inStock
          ? `<button class="btn" style="background:#444;color:#aaa">Out of Stock</button>`
          : existing
          ? `
          <div style="display:flex;gap:10px;">
            <button onclick="changeQty('${p.id}',-1)">-</button>
            <span>${existing.qty}</span>
            <button onclick="changeQty('${p.id}',1)">+</button>
          </div>
          `
          : `<button class="btn" onclick="addToCart('${p.id}')">Add to Cart</button>`
        }

      </div>

    </div>
    `;
  });

}

/* START */
updateCart();
render();

</script>

</body>
</html>
