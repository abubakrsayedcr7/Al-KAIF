<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALKAIF</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Inter';
  background:#020705;
  color:#fff;
}

/* BG */
.bg{
  position:fixed;
  width:200%;
  height:200%;
  background:
    radial-gradient(circle at 20% 70%, #00ff8840, transparent 60%),
    radial-gradient(circle at 80% 20%, #00ffaa30, transparent 60%);
  filter:blur(100px);
  animation:move 10s infinite alternate;
  z-index:-1;
}
@keyframes move{
  0%{transform:translate(0,0)}
  100%{transform:translate(-120px,80px)}
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:20px;
}
.logo{
  font-family:'Playfair Display';
  font-size:26px;
}

/* NAV */
.nav button{
  background:#111;
  border:1px solid #333;
  padding:10px 18px;
  border-radius:25px;
  color:#fff;
  margin-left:10px;
}

/* HERO */
.hero{
  text-align:center;
  padding:60px 20px;
}
.hero h1{
  font-family:'Playfair Display';
  font-size:50px;
}
.hero p{opacity:0.7}

/* FEATURES */
.features{
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
}
.feature{
  background:#111;
  padding:10px 15px;
  border-radius:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
  padding:20px;
}

/* CARD */
.card{
  background:#111;
  border-radius:20px;
  overflow:hidden;
}
.card img{
  width:100%;
  height:220px;
  object-fit:cover;
}
.content{padding:15px}

/* BUTTON */
.btn{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#fff;
  color:#000;
  font-weight:600;
}

/* FLOAT CART */
.cart{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#fff;
  color:#000;
  padding:14px 20px;
  border-radius:40px;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="header">
  <div class="logo">ALKAIF</div>
  <div class="nav">
    <a href="orders.html"><button>Orders</button></a>
    <a href="cart.html"><button id="cartCount">Cart (0)</button></a>
  </div>
</div>

<div class="hero">
  <h1>ALKAIF</h1>
  <p>Elegance in Modesty • Premium Islamic Wear</p>
</div>

<div class="features">
  <div class="feature">Premium Fabric</div>
  <div class="feature">Modern Design</div>
  <div class="feature">Comfort Fit</div>
</div>

<div class="grid" id="grid"></div>

<a href="cart.html" class="cart" id="floatCart">🛒 Cart (0)</a>

<script>

/* ================= PRODUCTS (6 FIXED) ================= */
let products=[
{id:"1",name:"Puzzle Jubba",price:1999,oldPrice:3300,image:"https://picsum.photos/id/1011/400/500",stock:10},
{id:"2",name:"Cream Antdot",price:1999,oldPrice:3300,image:"https://picsum.photos/id/1005/400/500",stock:5},
{id:"3",name:"Golden Antdot",price:1999,oldPrice:3300,image:"https://picsum.photos/id/1001/400/500",stock:0},
{id:"4",name:"Dotline Blue",price:1999,oldPrice:3300,image:"https://picsum.photos/id/1012/400/500",stock:7},
{id:"5",name:"Equaline Grey",price:1999,oldPrice:3300,image:"https://picsum.photos/id/1013/400/500",stock:6},
{id:"6",name:"RedCollar Black",price:1999,oldPrice:3300,image:"https://picsum.photos/id/1015/400/500",stock:4}
];

/* ================= CART ================= */
let cart=JSON.parse(localStorage.getItem("cart"))||[];

const grid=document.getElementById("grid");
const cartCount=document.getElementById("cartCount");
const floatCart=document.getElementById("floatCart");

/* LOGIN */
function isLogged(){
  return localStorage.getItem("user");
}

/* UPDATE CART COUNT */
function updateCart(){
  let count=cart.reduce((s,i)=>s+i.qty,0);
  cartCount.innerText=`Cart (${count})`;
  floatCart.innerText=`🛒 Cart (${count})`;
}

/* ADD */
window.addToCart=(id)=>{

  if(!isLogged()){
    location.href="login.html";
    return;
  }

  let p=products.find(x=>x.id==id);

  if(!p || p.stock<=0){
    alert("Out of stock ❌");
    return;
  }

  let ex=cart.find(x=>x.id==id);

  if(ex) ex.qty++;
  else cart.push({...p,qty:1});

  localStorage.setItem("cart",JSON.stringify(cart));

  updateCart();
  render();
};

/* QTY */
window.changeQty=(id,val)=>{
  let item=cart.find(x=>x.id==id);
  if(!item) return;

  item.qty+=val;

  if(item.qty<=0){
    cart=cart.filter(x=>x.id!=id);
  }

  localStorage.setItem("cart",JSON.stringify(cart));

  updateCart();
  render();
};

/* OPEN PRODUCT */
window.openProduct=(id)=>{
  location.href="product.html?id="+id;
};

/* RENDER */
function render(){

  grid.innerHTML="";

  products.forEach(p=>{

    let existing=cart.find(c=>c.id==p.id);
    let inStock=p.stock>0;

    grid.innerHTML+=`
    <div class="card">

      <img src="${p.image}" onclick="openProduct('${p.id}')">

      <div class="content">
        <div>${p.name}</div>

        <div>
          <span style="text-decoration:line-through;opacity:0.5">₹${p.oldPrice}</span>
          <b> ₹${p.price}</b>
        </div>

        ${
          !inStock
          ? `<button class="btn" style="background:#444;color:#aaa">Out of Stock</button>`
          : existing
          ? `
          <div style="display:flex;gap:10px;margin-top:10px;">
            <button onclick="changeQty('${p.id}',-1)">-</button>
            <span>${existing.qty}</span>
            <button onclick="changeQty('${p.id}',1)">+</button>
          </div>
          `
          : `<button onclick="addToCart('${p.id}')" class="btn">Add to Cart</button>`
        }

      </div>

    </div>
    `;
  });

}

/* START */
updateCart();
render();

</script>

</body>
</html>
