<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - ALKAIF</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter';
  background:#020705;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

/* BOX */
.box{
  background:#111;
  padding:30px;
  border-radius:20px;
  text-align:center;
  width:90%;
  max-width:350px;
}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#fff;
  color:#000;
  font-weight:600;
  margin-top:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
  <h2 style="font-family:Playfair Display">ALKAIF</h2>
  <p style="opacity:0.7">Continue with Google</p>

  <button onclick="googleLogin()">Login with Google</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getAuth, 
  GoogleAuthProvider, 
  signInWithPopup,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* FIREBASE */
const app = initializeApp({
  apiKey:"AIzaSyBcvViENWxHC1b9j5V2xOFGMaL-2TYfdiw",
  authDomain:"al-kaif-61446.firebaseapp.com",
  projectId:"al-kaif-61446"
});

const auth = getAuth(app);
const provider = new GoogleAuthProvider();

/* AUTO LOGIN CHECK */
onAuthStateChanged(auth,(user)=>{
  if(user){
    localStorage.setItem("user", user.email);
    location.href="index.html";
  }
});

/* LOGIN */
window.googleLogin = async ()=>{
  try{
    const result = await signInWithPopup(auth, provider);
    const user = result.user;

    localStorage.setItem("user", user.email);

    location.href="index.html";

  }catch(err){
    alert("Login failed ❌");
    console.log(err);
  }
};

</script>

</body>
</html>
