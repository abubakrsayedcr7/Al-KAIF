<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - ALKAIF</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box}

/* BODY */
body{
  font-family:'Inter',sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#fff;
}

/* BOX */
.box{
  text-align:center;
  padding:30px;
  width:90%;
  max-width:350px;
  animation:fade 0.6s ease;
}

/* LOGO */
.logo{
  font-family:'Playfair Display';
  font-size:28px;
  margin-bottom:10px;
}

.tag{
  color:#777;
  font-size:13px;
  margin-bottom:25px;
}

/* BUTTON */
.btn{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:none;
  background:#000;
  color:#fff;
  font-size:14px;
  cursor:pointer;
}

/* BACK */
.back{
  margin-top:15px;
  font-size:13px;
  display:block;
  color:#000;
  text-decoration:none;
}

/* ANIMATION */
@keyframes fade{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

</style>
</head>
<body>

<div class="box">

  <div class="logo">ALKAIF</div>
  <div class="tag">Elegance in Modesty</div>

  <button class="btn" onclick="login()">Continue with Google</button>

  <a href="index.html" class="back">Back to Shop</a>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, setDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* FIREBASE */
const app = initializeApp({
  apiKey: "AIzaSyBcvViENWxHC1b9j5V2xOFGMaL-2TYfdiw",
  authDomain: "al-kaif-61446.firebaseapp.com",
  projectId: "al-kaif-61446",
});

const auth = getAuth(app);
const db = getFirestore(app);

/* LOGIN */
window.login = async ()=>{

  try{

    const provider = new GoogleAuthProvider();
    const result = await signInWithPopup(auth, provider);

    const user = result.user;

    /* SAVE USER */
    await setDoc(doc(db,"users", user.uid),{
      email:user.email,
      name:user.displayName
    });

    /* REDIRECT */
    location.href="index.html";

  }catch(e){
    alert("Login failed");
  }

};

</script>

</body>
</html>
